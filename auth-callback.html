<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth Redirect | Broker Connector</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --panel: #ffffff;
      --text: #243041;
      --muted: #6b7280;
      --line: rgba(148, 163, 184, 0.24);
      --gold: #d4af37;
      --gold-deep: #8f6a12;
      --shadow: 0 22px 48px rgba(15, 23, 42, 0.08);
      --green: #166534;
      --green-bg: #f0fdf4;
      --red: #b91c1c;
      --red-bg: #fef2f2;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f8fafc, #eef3f9);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 540px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--gold-deep);
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .status {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font-size: 0.95rem;
      line-height: 1.5;
      background: #fff;
    }

    .status.success {
      background: var(--green-bg);
      color: var(--green);
      border-color: rgba(22, 101, 52, 0.18);
    }

    .status.error {
      background: var(--red-bg);
      color: var(--red);
      border-color: rgba(185, 28, 28, 0.18);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Broker Connector</div>
    <h1 id="callbackTitle">Completing your secure link...</h1>
    <p id="callbackCopy">Please wait while we verify your email action.</p>
    <div class="status" id="callbackStatus">Checking your authentication link...</div>
  </div>

  <script>
    function setState(title, copy, message, tone = 'success') {
      document.getElementById('callbackTitle').textContent = title;
      document.getElementById('callbackCopy').textContent = copy;
      const status = document.getElementById('callbackStatus');
      status.className = `status ${tone}`;
      status.textContent = message;
    }

    function getHashParams() {
      return new URLSearchParams(window.location.hash.replace(/^#/, ''));
    }

    (function init() {
      const query = new URLSearchParams(window.location.search);
      const hash = getHashParams();
      const errorDescription = query.get('error_description') || hash.get('error_description') || query.get('message') || '';
      const type = query.get('type') || hash.get('type') || '';
      const hasRecoveryToken = Boolean(hash.get('access_token') || query.get('access_token'));

      if (errorDescription) {
        setState(
          'Link unavailable',
          'This auth link can no longer be used.',
          'Confirmation link is invalid or expired.',
          'error'
        );
        setTimeout(() => {
          window.location.replace('index.html?auth=confirmation-invalid');
        }, 1800);
        return;
      }

      if (type === 'recovery' || hasRecoveryToken) {
        setState(
          'Reset your password',
          'We are sending you to the secure password reset form.',
          'Redirecting to password reset...',
          'success'
        );
        const target = new URL('reset-password.html', window.location.href);
        if (window.location.hash) {
          target.hash = window.location.hash;
        }
        setTimeout(() => {
          window.location.replace(target.toString());
        }, 500);
        return;
      }

      setState(
        'Email confirmed',
        'Your broker account email has been confirmed successfully.',
        'Email confirmed successfully. Redirecting to sign in...',
        'success'
      );
      setTimeout(() => {
        window.location.replace('index.html?auth=confirmed');
      }, 1400);
    })();
  </script>
</body>
</html>
