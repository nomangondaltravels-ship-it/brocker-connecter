<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Broker Connector</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --panel: #ffffff;
      --text: #243041;
      --muted: #6b7280;
      --line: rgba(148, 163, 184, 0.24);
      --gold: #d4af37;
      --gold-deep: #8f6a12;
      --shadow: 0 22px 48px rgba(15, 23, 42, 0.08);
      --green: #166534;
      --green-bg: #f0fdf4;
      --red: #b91c1c;
      --red-bg: #fef2f2;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f8fafc, #eef3f9);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 540px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--gold-deep);
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.1;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    .status {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .status.active { display: block; }
    .status.error {
      background: var(--red-bg);
      color: var(--red);
      border-color: rgba(185, 28, 28, 0.18);
    }
    .status.success {
      background: var(--green-bg);
      color: var(--green);
      border-color: rgba(22, 101, 52, 0.18);
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: rgba(212, 175, 55, 0.55);
      box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.12);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .btn {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 14px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(135deg, #f0de9b, var(--gold) 45%, #9e7415 100%);
      color: #111827;
      box-shadow: 0 12px 28px rgba(143, 106, 18, 0.16);
    }

    .btn-secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--line);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Broker Connector</div>
    <h1>Reset Password</h1>
    <p>Enter a new password for your broker account. This secure reset page is linked from your email.</p>
    <div class="status" id="resetStatus"></div>
    <form id="resetForm" class="grid">
      <div>
        <label for="newPassword">New Password</label>
        <input id="newPassword" type="password" autocomplete="new-password" />
      </div>
      <div>
        <label for="confirmNewPassword">Confirm Password</label>
        <input id="confirmNewPassword" type="password" autocomplete="new-password" />
      </div>
      <div class="actions">
        <button class="btn btn-primary" type="submit" id="resetSubmitBtn">Save New Password</button>
        <a class="btn btn-secondary" href="index.html">Back to Sign In</a>
      </div>
    </form>
  </div>

  <script>
    const supabaseUrl = 'https://unggpaomyzvurmawnahj.supabase.co';
    const supabaseKey = 'sb_publishable_32o5MAuNPn1e0Uy6ZC09Wg_2skR1xQW';

    function setStatus(message = '', tone = 'error') {
      const el = document.getElementById('resetStatus');
      if (!message) {
        el.className = 'status';
        el.textContent = '';
        return;
      }
      el.className = `status active ${tone}`;
      el.textContent = message;
    }

    function getRecoveryAccessToken() {
      const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      const query = new URLSearchParams(window.location.search);
      return hash.get('access_token') || query.get('access_token') || '';
    }

    function setLoading(isLoading) {
      const button = document.getElementById('resetSubmitBtn');
      button.disabled = Boolean(isLoading);
      button.textContent = isLoading ? 'Saving...' : 'Save New Password';
    }

    const recoveryToken = getRecoveryAccessToken();
    if (!recoveryToken) {
      setStatus('This reset link is invalid or has expired. Please request a new password reset email.');
    }

    document.getElementById('resetForm').addEventListener('submit', async event => {
      event.preventDefault();
      try {
        setStatus('');
        if (!recoveryToken) {
          throw new Error('This reset link is invalid or has expired. Please request a new password reset email.');
        }

        const password = String(document.getElementById('newPassword').value || '').trim();
        const confirmPassword = String(document.getElementById('confirmNewPassword').value || '').trim();

        if (password.length < 6) {
          throw new Error('Password must be at least 6 characters long.');
        }
        if (password !== confirmPassword) {
          throw new Error('Passwords do not match.');
        }

        setLoading(true);
        const response = await fetch(`${supabaseUrl}/auth/v1/user`, {
          method: 'PUT',
          headers: {
            apikey: supabaseKey,
            Authorization: `Bearer ${recoveryToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password })
        });

        const result = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(result?.msg || result?.message || result?.error_description || 'Password reset failed. Please request a new reset link.');
        }

        setStatus('Your password has been updated successfully. You can sign in now.', 'success');
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmNewPassword').value = '';
      } catch (error) {
        setStatus(error?.message || 'Password reset failed. Please request a new reset link.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
